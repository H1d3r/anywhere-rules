name: Update CN accelerated rules

on:
  workflow_dispatch:
  schedule:
    # Weekly at 05:38 Asia/Shanghai.
    - cron: "38 21 * * 3"

permissions:
  contents: write

jobs:
  cn-accelerated:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maxminddb

      - name: Build CN accelerated rules
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/build_cn_accelerated.py --workers 128 --timeout 2

      - name: Commit CN accelerated rules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules/common/CN_Accelerated.arrs rules/common/index.json rules/common/catalog.md
          if git diff --cached --quiet; then
            echo "No CN accelerated updates."
          else
            git commit -m "Update CN Accelerated $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
