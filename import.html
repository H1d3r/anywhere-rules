<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Anywhere Rule Set</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(520px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.55;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: #0a7cff;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .hint {
      color: color-mix(in srgb, CanvasText 62%, Canvas);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Open Anywhere</h1>
    <p id="status">Preparing import link...</p>
    <p><a id="open" class="button" href="#" rel="nofollow">Open in Anywhere</a></p>
    <p class="hint">If nothing happens, make sure Anywhere 281 or later is installed.</p>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var links = params.getAll("link").filter(Boolean);
      var status = document.getElementById("status");
      var button = document.getElementById("open");

      if (!links.length) {
        status.textContent = "Missing rule-set link.";
        button.style.display = "none";
        return;
      }

      var deepLink = "anywhere://add-rule-set?" + links.map(function (link) {
        return "link=" + encodeURIComponent(link);
      }).join("&");

      button.href = deepLink;
      status.textContent = links.length === 1
        ? "Opening one rule set in Anywhere..."
        : "Opening " + links.length + " rule sets in Anywhere...";

      setTimeout(function () {
        window.location.href = deepLink;
      }, 100);
    }());
  </script>
</body>
</html>
